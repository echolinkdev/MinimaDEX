<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link rel="stylesheet" href="./css/style.css">
	<link rel="stylesheet" href="./css/panel_myorders.css">
	
	<script type="text/javascript" src="./js/jquery-3.7.1.min.js"></script>
	
	<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1"></script>
	<script src="./js/chartjs-chart-financial.min.js" type="text/javascript"></script>
	
    <title>Minima DEX</title>
</head>

<body>

	<style>
		
		table {
			border-spacing:0;
			padding:0;
		}
		
		td {
			padding:0px;
			margin:0;
		}
		
		.fullwidthheight {
			width:100%;
			height:100%;
		}
		
	</style>
	
	<table class="fullwidthheight" border=0>
		
		<!-- TOP MENU-->
		<tr>
			<td>
				TOP MENU
			</td>
			<td>
				HELP SETTINGS
			</td>
		</tr>
		
		<tr style="height:100%">
			<td style="" colspan=2>
				
				<!--The MAIN dex-->
				<div class="fullwidthheight" style="background:red;" id="id_view_maindex" >
					
					<!-- the Main DEX page -->	
					<table class="fullwidthheight" style="" border=0>
						<tr>
							<td style="width:300px;padding-top:10px;padding-bottom:10px;padding-left:10px;padding-right:5px;">
								
								<table class="fullwidthheight" border=0>
									<tr style="">
										<td style="padding-bottom:10px;">
											<div class="greyrounded">
												My ORDERS
											</div>
										</td>
									</tr>
						
									<tr style="height:150px;">
										<td>
											<div class="greyrounded">
												
												<table class="fullwidthheight" border=1>
													<tr>
														<td style="text-align:right">Amount : </td>
														<td><input type=number></td>
													</tr>
													<tr>
														<td style="text-align:right">Price : </td>
														<td><input type=number></td>
													</tr>
													<tr>
														<td><button>BUY</button></td>
														<td style="text-align:right"><button>SELL</button></td>
													</tr>
												</table>												

											</div>
										</td>
									</tr>
								</table>
								
							</td>
							
							<td style="padding-top:10px;padding-bottom:10px;padding-left:5px;padding-right:5px;width:500px;">
								
								<table class="fullwidthheight" border=0>
									
									<tr style="height:50px;">
										<td style="padding-bottom:10px;">
											<div class="greyrounded">
												
												<div style="text-align:center;padding-top:10px;">
													<select style="width:90%">
														<option>Minima / MxUSD</option>
														<option>BarryBoy / Minima </option>
														<option>BarryBoy / MxUSD </option>	
													</select>
													<br>
													USD: 0xFFEDDFFED87687676..<br>
													Minima: 0x00<br>
												</div>
												
											</div>
										</td>
									</tr>
																	
									<tr>
										<td style="padding-bottom:10px;">
											<div class="greyrounded">
												PRICE GRAPH
											</div>
										</td>
									</tr>
						
									<tr style="height:250px;">
										<td>
											<div class="greyrounded">
												
												<div style="height:95%;text-align:center;padding-top:0px;background:green;">
													
													<table class="fullwidthheight" border=1>
														<tr>
															<td>
																<textarea style="width:90%;height:160px;resize:none;"></textarea>			
															</td>
														</tr>
														<tr>
															<td><input type="text" style="width:250px;"> <button>Chat</button></td>
														</tr>
													</table>
													
													
													
												</div>
												
											</div>
										</td>
									</tr>
								</table>
								
							</td>
							
							<td style="">
								
								<table class="fullwidthheight" style="padding-top:10px;padding-bottom:10px;padding-left:5px;padding-right:10px;" border=0>
									<tr>
										<td style="padding-bottom:10px;">
											<div class="greyrounded">
												ALL ORDERS
											</div>
										</td>
									</tr>
									
									<tr style="">
										<td>
											<div class="greyrounded">
												ALL TRADES
											</div>
										</td>
									</tr>
								</table>
							</td>
						</tr>

					</table>
					
				</div>
				
				<!--The WALLET -->
				<div style="width:100%;height:100%;" id="id_view_wallet" >
					WALLET
				</div>

				<!--The HELP -->
				<div style="width:100%;height:100%;" id="id_view_help" >
					HELP
				</div>
				
				<!--The Settings-->
				<div style="width:100%;height:100%;" id="id_view_settings" >
					SETTINGS
				</div>	
					
			</td>			
		</tr>
		
			
	<table>
	
	<script type="text/javascript">
		
		/*function getStyle(id, name){
		    var element = document.getElementById(id);
		    return element.currentStyle ? element.currentStyle[name] : window.getComputedStyle ? window.getComputedStyle(element, null).getPropertyValue(name) : null;
		}*/
		
		dex();
		
		function dex(){
			id_view_maindex.style.display="block";
			id_view_wallet.style.display="none";
			id_view_help.style.display="none";
			id_view_settings.style.display="none";
		}
		
		function wallet(){
			id_view_maindex.style.display="none";
			id_view_wallet.style.display="block";
			id_view_help.style.display="none";
			id_view_settings.style.display="none";
		}
		
		function help(){
			id_view_maindex.style.display="none";
			id_view_wallet.style.display="none";
			id_view_help.style.display="block";
			id_view_settings.style.display="none";
		}
		
		function settings(){
			id_view_maindex.style.display="none";
			id_view_wallet.style.display="none";
			id_view_help.style.display="none";
			id_view_settings.style.display="block";
		}
		
		
		//$("#id_maindex").html("Hello World");
		
	</script>

	<script type="text/javascript" src="./js/panels/panel_myorders.js"></script>
	<script type="text/javascript" src="./js/chartgraph.js"></script>
	-->
				
</body>
</html>
